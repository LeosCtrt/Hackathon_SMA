  metabolique:           [E16, E46, E61, E64, E74, E75, E83, E87, E88]

  priorite_diagnostic:
    # [DEMO] demo_coordinateur.py _DIAG_PRIORITY_PREFIXES
    # Index 0 = plus prioritaire. Règle : garder le diagnostic le plus spécifique par séjour.
    - rang: 0
      prefixes: [E20, E21, E22, E23, E24, E25, E26, E27, E28, E29, E34]
      label: "Troubles endocriniens spécifiques (surrénale, hypophyse, gonades)"
    - rang: 1
      prefixes: [E10, E11, E13, E14]
      label: "Diabète type 1 et type 2"
    - rang: 2
      prefixes: [E03, E04, E05, E06, E07]
      label: "Pathologies thyroïdiennes"
    - rang: 3
      prefixes: [E66]
      label: "Obésité"
    - rang: 4
      prefixes: [E16, E46, E61, E64, E74, E75, E83, E87, E88]
      label: "Troubles métaboliques"

  unites_hdj_explicites:
    # [ELIG] UNITES_HDJ_EXPLICITES
    - "HDJ CONSULTATION"

  specialites_hors_endocrino:
    # [ELIG] SPECIALITES_HORS_ENDOCRINO
    - "GYNECOLOGIE OBSTETRIQUE"
    - "GYNECOLOGIE OBSTETRIQUE ET GYNECOLOGIE MEDICALE"
    - "SAGE-FEMME"

